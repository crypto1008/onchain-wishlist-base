<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>On-Chain Wishlist on Base</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #0052ff; text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
    .contract-address { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 30px; font-size: 12px; color: #888; word-break: break-all; }
    .contract-address a { color: #0052ff; }
    .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h2 { color: #0052ff; margin-bottom: 15px; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; }
    button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; }
    .btn-primary { background: #0052ff; color: white; width: 100%; }
    .btn-primary:hover { background: #0040cc; }
    .btn-connect { background: #0052ff; color: white; width: 100%; margin-bottom: 20px; }
    .wallet-info { background: #1a1a1a; border-radius: 8px; padding: 10px; margin-bottom: 20px; font-size: 13px; color: #888; }
    .wish-card { background: #1a1a1a; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
    .wish-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
    .wish-desc { font-size: 13px; color: #888; margin-bottom: 10px; }
    .progress-bar { background: #333; border-radius: 10px; height: 8px; margin-bottom: 8px; }
    .progress-fill { background: #0052ff; border-radius: 10px; height: 8px; transition: width 0.3s; }
    .wish-stats { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 10px; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge-funded { background: #00ff88; color: #000; }
    .badge-cancelled { background: #ff4444; color: #fff; }
    .badge-active { background: #0052ff; color: #fff; }
    .status { text-align: center; padding: 10px; color: #888; font-size: 13px; }
    .error { color: #ff4444; font-size: 13px; margin-top: 5px; }
    .success { color: #00ff88; font-size: 13px; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 On-Chain Wishlist</h1>
    <p class="subtitle">Create wishes and let anyone fund them with ETH on Base</p>

    <div class="contract-address">
      📄 Contract: <a href="https://basescan.org/address/0x656B9bc877a7052968Cf8931f2b71150650cD35e" target="_blank">
        0x656B9bc877a7052968Cf8931f2b71150650cD35e
      </a>
    </div>

    <button class="btn-connect" onclick="connectWallet()">🔗 Connect Wallet</button>
    <div class="wallet-info" id="walletInfo">Not connected</div>

    <div class="card">
      <h2>✨ Create a Wish</h2>
      <input type="text" id="wishTitle" placeholder="Wish title (e.g. New Laptop)" />
      <textarea id="wishDesc" rows="3" placeholder="Describe your wish..."></textarea>
      <input type="number" id="wishGoal" placeholder="Goal amount in ETH (e.g. 0.1)" step="0.001" />
      <button class="btn-primary" onclick="createWish()">Create Wish</button>
      <div id="createStatus"></div>
    </div>

    <div class="card">
      <h2>💰 Fund a Wish</h2>
      <input type="number" id="fundId" placeholder="Wish ID (e.g. 0)" />
      <input type="number" id="fundAmount" placeholder="Amount in ETH (e.g. 0.01)" step="0.001" />
      <button class="btn-primary" onclick="fundWish()">Fund Wish</button>
      <div id="fundStatus"></div>
    </div>

    <div class="card">
      <h2>📋 All Wishes</h2>
      <button class="btn-primary" onclick="loadWishes()" style="margin-bottom:15px">🔄 Load Wishes</button>
      <div id="wishesList"><p class="status">Click Load Wishes to see all wishes</p></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <script>
    const CONTRACT_ADDRESS = "0x656B9bc877a7052968Cf8931f2b71150650cD35e";
    const ABI = [
      "function createWish(string,string,uint256) external",
      "function fundWish(uint256) external payable",
      "function claimWish(uint256) external",
      "function cancelWish(uint256) external",
      "function getWishes() external view returns (tuple(uint256,string,string,uint256,uint256,bool,bool)[])",
      "function getFundingProgress(uint256) external view returns (uint256)",
      "function isFullyFunded(uint256) external view returns (bool)"
    ];

    let provider, signer, contract;

    async function connectWallet() {
      if (!window.ethereum) {
        alert("Please install MetaMask!");
        return;
      }
      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      const address = await signer.getAddress();
      const network = await provider.getNetwork();
      document.getElementById("walletInfo").innerHTML =
        "✅ Connected: " + address.slice(0,6) + "..." + address.slice(-4) +
        " | Network ID: " + network.chainId;
      contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    }

    async function createWish() {
      if (!contract) { alert("Connect wallet first!"); return; }
      const title = document.getElementById("wishTitle").value;
      const desc = document.getElementById("wishDesc").value;
      const goal = document.getElementById("wishGoal").value;
      const status = document.getElementById("createStatus");
      try {
        status.innerHTML = '<span class="status">Creating wish...</span>';
        const tx = await contract.createWish(title, desc, ethers.parseEther(goal));
        await tx.wait();
        status.innerHTML = '<span class="success">✅ Wish created successfully!</span>';
        loadWishes();
      } catch (e) {
        status.innerHTML = '<span class="error">❌ ' + e.message + '</span>';
      }
    }

    async function fundWish() {
      if (!contract) { alert("Connect wallet first!"); return; }
      const id = document.getElementById("fundId").value;
      const amount = document.getElementById("fundAmount").value;
      const status = document.getElementById("fundStatus");
      try {
        status.innerHTML = '<span class="status">Funding wish...</span>';
        const tx = await contract.fundWish(id, { value: ethers.parseEther(amount) });
        await tx.wait();
        status.innerHTML = '<span class="success">✅ Wish funded successfully!</span>';
        loadWishes();
      } catch (e) {
        status.innerHTML = '<span class="error">❌ ' + e.message + '</span>';
      }
    }

    async function loadWishes() {
      if (!contract) { alert("Connect wallet first!"); return; }
      const list = document.getElementById("wishesList");
      try {
        list.innerHTML = '<p class="status">Loading...</p>';
        const wishes = await contract.getWishes();
        if (wishes.length === 0) {
          list.innerHTML = '<p class="status">No wishes yet. Create one above!</p>';
          return;
        }
        list.innerHTML = "";
        for (let i = 0; i < wishes.length; i++) {
          const w = wishes[i];
          const goal = ethers.formatEther(w[3]);
          const funded = ethers.formatEther(w[4]);
          const claimed = w[5];
          const cancelled = w[6];
          const progress = goal > 0 ? Math.min((funded / goal) * 100, 100).toFixed(0) : 0;
          let badge = '<span class="badge badge-active">Active</span>';
          if (claimed) badge = '<span class="badge badge-funded">Claimed</span>';
          if (cancelled) badge = '<span class="badge badge-cancelled">Cancelled</span>';
          list.innerHTML += `
            <div class="wish-card">
              <div class="wish-title">#${i} — ${w[1]} ${badge}</div>
              <div class="wish-desc">${w[2]}</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
              <div class="wish-stats">
                <span>Funded: ${funded} ETH</span>
                <span>Goal: ${goal} ETH</span>
                <span>${progress}%</span>
              </div>
            </div>`;
        }
      } catch (e) {
        list.innerHTML = '<span class="error">❌ ' + e.message + '</span>';
      }
    }
  </script>
</body>
</html>
